initial_planning_task:
  description: >
    规划《{game_topic}》的大纲，包含核心反转点和解谜机制。
  expected_output: >
    Markdown大纲文档。
    核心要求：请务必在文档的最末尾，另起一行，输出本项目规划出的所有章节名称（用逗号分隔）。
    规则：1. 必须符合叙事逻辑（包含序章、高潮和结局）；2. 章节名需带小标题；3. 格式必须严格如下示例：
    【章节清单】：序章, 第一章:初遇, 第二章:暗流, 终章:破晓
  
story_writing_task:
  description: >
    请基于以下世界观大纲内容：\n{outline}\n\n为第 {chapter} 章编写具体剧本，必须包含分支选项。
    核心工业规范：为了配合底层程序的精准解析，当发生影响游戏状态的事件时，必须在剧本对应位置强制插入【系统标签】：
    1. 物品变动：`[系统：获得道具 古玉]` 或 `[系统：失去道具 铁钥匙]`
    2. 数值变动：`[系统：心神值 -10]` 或 `[系统：好感度 +5]`
    3. 场景跳转：`[系统：场景切换至 地下室]`
  expected_output: Markdown格式的详细剧本文档，重要事件必须带有严谨的 `[系统：xxx]` 标签。

puzzle_design_task:
  description: 在剧本中设计解谜环节及所需道具。
  expected_output: 谜题设计说明书。

logic_conversion_task:
  description: >
    请阅读以下剧本内容：\n{script}\n\n将其转化为结构化的 JSON 逻辑节点。
    绝对铁律：
    1. 你是一个无情的代码机器。只能解析剧本中带有 `[系统：xxx]` 标签的变量变化！
    2. 剧本没写 `[系统：xxx]` 的地方，哪怕文字描述得再惊险，你也绝对不准自行添加任何物品或数值的改变！
    3. 严格遵循下方的预期输出格式，不要捏造多余的 Key。
  expected_output: >
    必须输出合法的 JSON 文本，包含 nodes 数组。格式模板如下：
    {
      "nodes": [
        {
          "id": "node_01",
          "text": "旁白或对话文本内容...",
          "items_changed": {"古玉": 1, "铁钥匙": -1},  // 没有则为空字典 {}
          "stats_changed": {"心神值": -10},             // 没有则为空字典 {}
          "choices": [
            {"label": "选项A的文本", "target": "node_02"}
          ]
        }
      ]
    }

asset_planning_task:
  description: >
    请仔细阅读以下第 {chapter} 章的剧本：\n{script}\n\n
    从中梳理出《多媒体素材需求清单》，包含：
    1. 美术需求（明确指出需要的：立绘、场景背景图、关键剧情CG、UI道具）。
    2. 音频需求（BGM、特定音效）。
  expected_output: >
    一份结构清晰的纯文本美术与音频需求清单，不需要包含具体的生图提示词。

prompt_generation_task:
  description: >
    作为 AI 咒术师，请接收上一步统筹总监提取出的《素材需求清单》。
    请专门为其中的【场景】、【角色立绘】、【关键CG】和【UI道具】编写工业级的中文生图提示词（Prompt）。
    请严格按照以下公式编写：[画面主体结构] + [环境光影氛围] + [特定材质/细节特征] + [摄影视角与渲染画质]。
  expected_output: >
    一份精美的 Markdown 文档。先列出该资产的用途说明，然后用 Markdown 代码块（```）包裹对应的中文提示词，以便用户可以一键复制去生图。

final_check_task:
  description: >
    作为质量审核员，请阅读以下第 {chapter} 章的剧本内容：\n{script}\n\n
    以及程序员刚刚提取出的底层逻辑代码：\n{logic_json}\n\n
    请交叉比对两者，检查是否存在逻辑死锁、未闭环的分支、好感度判定错误或关键道具获取遗漏。
  expected_output: >
    一份给编剧看的 QA 审核报告（Markdown格式）。
    如果发现致命错误，请明确指出在剧本的哪里、需要怎么修改。
    如果没有错误，请输出“✅ 审核通过：未发现逻辑死锁，逻辑与剧本匹配完美。”